<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Đoán nhân vật lịch sử Việt Nam</title>
<style>
:root{--blue:#1373d6;--bg1:#f3f8ff;--bg2:#e8f2ff;--muted:#6b7280;--accent:#ffd166}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
.card{width:min(980px,96%);background:#fff;border-radius:16px;padding:24px 28px;box-shadow:0 18px 40px rgba(10,30,60,0.08)}
.header{display:flex;align-items:center;gap:12px}
.title{color:var(--blue);font-size:24px;font-weight:800}
.question{font-size:20px;margin:20px 0;min-height:56px;text-align:center}
.controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:10px 18px;border-radius:10px;border:0;cursor:pointer;font-weight:700;background:var(--blue);color:white}
.btn.gray{background:#6b7280}
.play{background:var(--accent);color:#000;padding:10px 20px;border-radius:10px;font-weight:800}
.small{font-size:13px;color:#555;margin-top:8px;text-align:center}
.result{margin-top:16px;padding:14px;border-radius:10px;background:#fff8e6}
.avatar{display:block;margin:10px auto;max-width:300px;border-radius:8px}
.hidden{display:none}
.warn{color:#b35200;font-weight:600}
.start-screen{position:fixed;inset:0;background:linear-gradient(135deg,#007bff,#66a6ff);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;z-index:999}
.start-screen h1{font-size:26px;margin:0 0 14px;text-align:center}
.start-btn{background:#fff;color:#007bff;border:0;padding:12px 26px;border-radius:10px;font-weight:800;cursor:pointer}
.footer-note{font-size:12px;color:#8b9ab0;text-align:center;margin-top:12px}
</style>
</head>
<body>

<!-- Màn mở đầu -->
<div id="startScreen" class="start-screen">
  <h1>CHÀO MỪNG BẠN ĐẾN VỚI TRÒ CHƠNG GIÁO DỤC<br>“ĐOÁN TÊN NHÂN VẬT LỊCH SỬ VIỆT NAM”</h1>
  <button class="start-btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
</div>

<!-- Giao diện chính -->
<div class="card hidden" id="gameCard">
  <div class="header">
    <div style="font-size:26px">🧠</div>
    <div style="flex:1">
      <div class="title">Đoán nhân vật lịch sử Việt Nam</div>
    </div>
  </div>

  <div id="main">
    <div id="question" class="question">Đang tải dữ liệu...</div>

    <div class="controls" id="controls">
      <button id="btnYes" class="btn">Đúng</button>
      <button id="btnNo" class="btn gray">Không</button>
      <button id="btnUnknown" class="btn gray">Không biết</button>
    </div>

    <div id="hint" class="small"></div>

    <div id="result" class="result hidden"></div>

    <div style="text-align:center;margin-top:12px">
      <button id="restart" class="play hidden">Chơi lại</button>
    </div>

    <div class="footer-note">Trả lời Đúng / Không / Không biết để hệ thống suy luận.</div>
  </div>
</div>

<script>
/* ========== Cấu hình Google Sheet ========== */
const SHEET_ID = "1TFTBGP4vqFJzzWIhLTZEEf_KumQFZNXSF-4qCv4JiAU";
const SHEET_PAGE = "Characters";
const OPENSHEET = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_PAGE}`;

/* ========== Helpers ========== */
function normalize(s){ if(s==null) return ''; return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
function boolLike(s){
  const v = normalize(s);
  if(v==='') return null;
  if(['co','có','yes','true','1','sinh','sống','con song'].some(x=>v.includes(x))) return true;
  if(['khong','không','no','false','0','mat','mất','qua doi','qua-đời'].some(x=>v.includes(x))) return false;
  return null;
}
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ========== UI refs ========== */
const startScreen = document.getElementById('startScreen');
const gameCard = document.getElementById('gameCard');
const questionEl = document.getElementById('question');
const btnYes = document.getElementById('btnYes');
const btnNo = document.getElementById('btnNo');
const btnUnknown = document.getElementById('btnUnknown');
const hintEl = document.getElementById('hint');
const resultEl = document.getElementById('result');
const restartBtn = document.getElementById('restart');
const controls = document.getElementById('controls');

/* ========== State ========== */
let ORIGINAL = [];
let remaining = [];
let askedTokens = new Set();
let step = 0;
let currentQ = null;
let achievementAsked = false;

/* ========== Layers (9 tầng) ==========
0: Alive
1: Gender
2: Field
3: Region
4: Period
5: Event
6: Province
7: DiedBefore2000
8: Achievement (final)
======================================== */
const TOTAL_STEPS = 9;

/* ========== Load data ========== */
async function loadData(){
  try{
    questionEl.textContent = 'Đang tải dữ liệu từ Google Sheet...';
    const res = await fetch(OPENSHEET, {cache:'no-store'});
    if(!res.ok) throw new Error('OpenSheet error ' + res.status);
    const data = await res.json();
    if(!Array.isArray(data) || data.length===0){
      questionEl.textContent = 'Lỗi: không đọc được dữ liệu. Kiểm tra quyền chia sẻ & tên sheet Characters.';
      return;
    }
    ORIGINAL = data.map(r => {
      const f = (keys)=> keys.find(k=> r[k] !== undefined);
      const Name = r[f(['name','Name','Tên','ten'])] || '';
      const Alive = r[f(['alive','Alive','còn sống','con song'])] || '';
      const Gender = r[f(['gender','Gender','giới tính','gioi tinh'])] || '';
      const Field = r[f(['field','Field','lĩnh vực','linh vuc'])] || '';
      const Region = r[f(['region','Region','vùng','miền','mien'])] || '';
      const Period = r[f(['period','Period','thời kì','thoi ky','thoi ki'])] || '';
      const Event = r[f(['event','Event','sự kiện','su kien','event'])] || '';
      const Province = r[f(['province','Province','tỉnh','tinh','quê quán'])] || '';
      const Died2000 = r[f(['died_before_2000','diedbefore2000','mất trước 2000','mat truoc 2000'])] || '';
      const Achievement = r[f(['achievement','Achievement','thành tựu','thanh tuu','contribution'])] || '';
      const Biography = r[f(['biography','Biography','tiểu sử','tieu su','bio'])] || '';
      const Image = r[f(['image','Image','ImageURL','imageurl','hinh','url'])] || '';
      return {
        Name: String(Name).trim(),
        AliveRaw: String(Alive).trim(),
        AliveBool: boolLike(Alive),
        GenderRaw: String(Gender).trim(),
        FieldRaw: String(Field).trim(),
        RegionRaw: String(Region).trim(),
        PeriodRaw: String(Period).trim(),
        EventRaw: String(Event).trim(),
        ProvinceRaw: String(Province).trim(),
        Died2000Raw: String(Died2000).trim(),
        AchievementRaw: String(Achievement).trim(),
        BiographyRaw: String(Biography).trim(),
        ImageRaw: String(Image).trim(),
        _norm:{
          name: normalize(Name),
          alive: normalize(Alive),
          gender: normalize(Gender),
          field: normalize(Field),
          region: normalize(Region),
          period: normalize(Period),
          event: normalize(Event),
          province: normalize(Province),
          died2000: normalize(Died2000),
          achievement: normalize(Achievement)
        }
      };
    });

    startRound();
  } catch(err){
    console.error(err);
    questionEl.textContent = 'Lỗi tải dữ liệu. Mở DevTools (F12) xem console.';
  }
}

/* ========== Start / Restart ========== */
function startGame(){
  startScreen.style.display = 'none';
  gameCard.classList.remove('hidden');
  loadData();
}
function startRound(){
  remaining = ORIGINAL.slice();
  askedTokens = new Set();
  step = 0;
  currentQ = null;
  achievementAsked = false;
  resultEl.classList.add('hidden');
  restartBtn.classList.add('hidden');
  controls.style.display = '';
  hintEl.textContent = '';
  nextQuestion();
}
restartBtn.addEventListener('click', ()=> {
  // back to intro
  gameCard.classList.add('hidden');
  startScreen.style.display = '';
});

/* ========== helpers ========== */
function inferRegionFromProvince(prov){
  if(!prov) return '';
  const p = normalize(prov);
  const north = ['ha noi','hanoi','nam dinh','ninh binh','thai binh','bac ninh','hai duong','phu tho','hoa binh','quang ninh','thanh hoa','nghe an','ha giang'];
  const central = ['quang','thua thien','quang binh','quang nam','quang ngai','binh dinh','phu yen','khanh hoa','da nang','quang tri','ha tinh'];
  const south = ['ho chi minh','tp hcm','vinh long','can tho','dong nai','binh duong','an giang','kien giang','vung tau','tay ninh','long an','ba ria'];
  for(const k of north) if(p.includes(k)) return 'bac';
  for(const k of central) if(p.includes(k)) return 'trung';
  for(const k of south) if(p.includes(k)) return 'nam';
  return '';
}

/* ========== build question per step ========== */
function buildQuestionForStep(s){
  if(s===0) return { key:'Alive', display:'Nhân vật này còn sống đúng không?' };
  if(s===1) return { key:'Gender', display:'Nhân vật này là Nam đúng không?' };
  if(s===2){
    const vals = [...new Set(remaining.map(r=>r._norm.field).filter(Boolean))];
    if(vals.length===0) return null;
    const pool = vals.filter(v=>!askedTokens.has('field:'+v));
    const chosen = pool.length ? pick(pool) : pick(vals);
    return { key:'Field', token:chosen, display:`Nhân vật này hoạt động trong lĩnh vực "${remaining.find(x=>x._norm.field===chosen)?.FieldRaw || chosen}" đúng không?` };
  }
  if(s===3){
    const regs = [...new Set(remaining.map(r=> r._norm.region || inferRegionFromProvince(r._norm.province)).filter(Boolean))];
    const pool = regs.length ? regs : ['bac','trung','nam'];
    const poolNotAsked = pool.filter(v=>!askedTokens.has('region:'+v));
    const chosen = poolNotAsked.length ? pick(poolNotAsked) : pick(pool);
    const map = { bac:'Bắc', trung:'Trung', nam:'Nam' };
    return { key:'Region', token:chosen, display:`Nhân vật này ở miền ${map[chosen] || chosen} đúng không?` };
  }
  if(s===4){
    const vals = [...new Set(remaining.map(r=>r._norm.period).filter(Boolean))];
    if(vals.length===0) return null;
    const pool = vals.filter(v=>!askedTokens.has('period:'+v));
    const chosen = pool.length ? pick(pool) : pick(vals);
    return { key:'Period', token:chosen, display:`Nhân vật này thuộc thời kỳ "${remaining.find(x=>x._norm.period===chosen)?.PeriodRaw || chosen}" đúng không?` };
  }
  if(s===5){
    // skip if all remaining are 'tien su'
    const periods = [...new Set(remaining.map(r=>r._norm.period))];
    if(periods.length===1 && periods[0]==='tien su') return null;
    const evs = [...new Set(remaining.map(r=>r._norm.event).filter(Boolean))];
    if(evs.length===0) return null;
    const pool = evs.filter(e=>!askedTokens.has('ev:'+e));
    const chosen = pool.length ? pick(pool) : pick(evs);
    return { key:'Event', token:chosen, display:`Nhân vật này nổi tiếng bởi sự kiện "${remaining.find(x=>x._norm.event===chosen)?.EventRaw || chosen}" đúng không?` };
  }
  if(s===6){
    const provs = [...new Set(remaining.map(r=>r._norm.province).filter(Boolean))];
    if(provs.length===0) return null;
    const pool = provs.filter(p=>!askedTokens.has('prov:'+p));
    const chosen = pool.length ? pick(pool) : pick(provs);
    return { key:'Province', token:chosen, display:`Nhân vật này quê quán ở ${remaining.find(x=>x._norm.province===chosen)?.ProvinceRaw || chosen} đúng không?` };
  }
  if(s===7){
    const vals = Array.from(new Set(remaining.map(r=>r._norm.died2000)));
    const meaningful = vals.filter(v=>v!=='');
    if(meaningful.length > 1 || (meaningful.length===1 && vals.length>1)){
      if(!askedTokens.has('died_before_2000')) return { key:'DiedBefore2000', display:'Nhân vật này mất trước năm 2000 đúng không?' };
    }
    return null;
  }
  if(s===8){
    const achs = [...new Set(remaining.map(r=>r._norm.achievement).filter(Boolean))];
    if(achs.length===0){
      const names = remaining.map(r=>r._norm.name).filter(Boolean);
      if(names.length) return { key:'Name', token:names[0], display:`Người này có phải là ${remaining.find(x=>x._norm.name===names[0]).Name} không?` };
      return null;
    }
    const pool = achs.filter(a=>!askedTokens.has('ach:'+a));
    const chosen = pool.length ? pick(pool) : pick(achs);
    return { key:'Achievement', token:chosen, display:`Nhân vật này có phải là người đã "${remaining.find(x=>x._norm.achievement===chosen)?.AchievementRaw || chosen}" không?` };
  }
  return null;
}

/* ========== next question ========== */
function nextQuestion(){
  hintEl.textContent = '';
  resultEl.classList.add('hidden');
  restartBtn.classList.add('hidden');
  controls.style.display = '';

  if(remaining.length === 1){
    // ensure achievement asked if available
    const ach = remaining[0]._norm.achievement;
    if(ach && !askedTokens.has('ach:'+ach)){
      step = 8;
    } else {
      showFinal();
      return;
    }
  }

  if(remaining.length === 0){
    showNoCandidateWithAdd();
    return;
  }

  // find next question respecting layer order
  let attempts = 0;
  let q = null;
  while(attempts < 12){
    q = buildQuestionForStep(step);
    if(q) break;
    step++;
    attempts++;
  }
  if(!q) q = buildQuestionForStep(step);
  if(!q){
    questionEl.textContent = 'Không có câu hỏi phù hợp. Vui lòng thử lại.';
    controls.style.display = 'none';
    restartBtn.classList.remove('hidden');
    return;
  }
  currentQ = q;
  questionEl.textContent = q.display;
  console.log('ASK:', q);
}

/* ========== answer handling (strict elimination) ========== */
function handleAnswer(ans){
  // ans: 'yes' | 'no' | 'unknown'
  if(!currentQ){
    step++;
    nextQuestion();
    return;
  }
  const k = currentQ.key;
  const tok = currentQ.token;

  if(ans === 'unknown'){
    if(tok){
      if(k==='Field') askedTokens.add('field:'+tok);
      if(k==='Event') askedTokens.add('ev:'+tok);
      if(k==='Province') askedTokens.add('prov:'+tok);
      if(k==='Achievement') askedTokens.add('ach:'+tok);
      if(k==='Name') askedTokens.add('name:'+tok);
      if(k==='Region') askedTokens.add('region:'+tok);
      if(k==='Period') askedTokens.add('period:'+tok);
    }
    if(k==='DiedBefore2000') askedTokens.add('died_before_2000');
    step++;
    nextQuestion();
    return;
  }

  // Build filtered strictly according to answer
  let filtered;
  if(k==='Alive'){
    if(ans==='yes') filtered = remaining.filter(p => p.AliveBool === true || (p._norm.alive && p._norm.alive.includes('co')));
    else filtered = remaining.filter(p => !(p.AliveBool === true || (p._norm.alive && p._norm.alive.includes('co'))));
  } else if(k==='Gender'){
    if(ans==='yes') filtered = remaining.filter(p => p._norm.gender && p._norm.gender.includes('nam'));
    else filtered = remaining.filter(p => !(p._norm.gender && p._norm.gender.includes('nam')));
  } else if(k==='Field' && tok){
    if(ans==='yes') filtered = remaining.filter(p => p._norm.field === tok || (p._norm.field && p._norm.field.includes(tok)));
    else filtered = remaining.filter(p => !(p._norm.field === tok || (p._norm.field && p._norm.field.includes(tok))));
    askedTokens.add('field:'+tok);
  } else if(k==='Region' && tok){
    if(ans==='yes') filtered = remaining.filter(p => (p._norm.region === tok) || (p._norm.region && p._norm.region.includes(tok)) || (inferRegionFromProvince(p._norm.province)===tok));
    else filtered = remaining.filter(p => !((p._norm.region === tok) || (p._norm.region && p._norm.region.includes(tok)) || (inferRegionFromProvince(p._norm.province)===tok)));
    askedTokens.add('region:'+tok);
  } else if(k==='Period' && tok){
    if(ans==='yes') filtered = remaining.filter(p => p._norm.period === tok || (p._norm.period && p._norm.period.includes(tok)));
    else filtered = remaining.filter(p => !(p._norm.period === tok || (p._norm.period && p._norm.period.includes(tok))));
    askedTokens.add('period:'+tok);
  } else if(k==='Event' && tok){
    if(ans==='yes') filtered = remaining.filter(p => p._norm.event === tok || (p._norm.event && p._norm.event.includes(tok)));
    else filtered = remaining.filter(p => !(p._norm.event === tok || (p._norm.event && p._norm.event.includes(tok))));
    askedTokens.add('ev:'+tok);
  } else if(k==='Province' && tok){
    if(ans==='yes') filtered = remaining.filter(p => p._norm.province === tok || (p._norm.province && p._norm.province.includes(tok)));
    else filtered = remaining.filter(p => !(p._norm.province === tok || (p._norm.province && p._norm.province.includes(tok))));
    askedTokens.add('prov:'+tok);
  } else if(k==='DiedBefore2000'){
    if(ans==='yes') filtered = remaining.filter(p => {
      const v = p._norm.died2000||'';
      return v.includes('co') || v.includes('yes') || v.includes('true');
    });
    else filtered = remaining.filter(p => {
      const v = p._norm.died2000||'';
      return !(v.includes('co') || v.includes('yes') || v.includes('true'));
    });
    askedTokens.add('died_before_2000');
  } else if(k==='Achievement' && tok){
    if(ans==='yes') filtered = remaining.filter(p => p._norm.achievement === tok || (p._norm.achievement && p._norm.achievement.includes(tok)));
    else filtered = remaining.filter(p => !(p._norm.achievement === tok || (p._norm.achievement && p._norm.achievement.includes(tok))));
    askedTokens.add('ach:'+tok);
    achievementAsked = true;
  } else if(k==='Name' && tok){
    if(ans==='yes') filtered = remaining.filter(p => p._norm.name === tok);
    else filtered = remaining.filter(p => p._norm.name !== tok);
    askedTokens.add('name:'+tok);
  } else {
    filtered = remaining.slice(); // fallback (shouldn't happen)
  }

  console.log('FILTER attempt for', k, tok, 'answer', ans, ' -> result count', filtered.length);

  // New strict behavior:
  // - If filtered.length > 0 => apply it (eliminate or keep)
  // - If filtered.length === 0 => that means user eliminated all candidates -> we show friendly message
  if(filtered.length > 0){
    remaining = filtered;
    hintEl.textContent = '';
    step++;
    // ensure achievement step if needed
    const achVals = Array.from(new Set(remaining.map(p=>p._norm.achievement).filter(Boolean)));
    if(remaining.length > 1 && achVals.length > 1) step = Math.min(step, 8);
    nextQuestion();
  } else {
    // No candidate left after applying the user's answer => friendly end
    remaining = [];
    showNoCandidateWithAdd();
  }
}

/* ========== show final / no candidate with add message ========== */
function showFinal(){
  controls.style.display = 'none';
  const p = remaining[0];
  let html = `<strong>🎯 Mình đoán: ${escapeHtml(p.Name)}</strong>`;
  html += `<div class="small"><b>Giới tính:</b> ${escapeHtml(p.GenderRaw||'')}</div>`;
  html += `<div class="small"><b>Lĩnh vực:</b> ${escapeHtml(p.FieldRaw||'')}</div>`;
  html += `<div class="small"><b>Miền:</b> ${escapeHtml(p.RegionRaw||'')}</div>`;
  html += `<div class="small"><b>Tỉnh:</b> ${escapeHtml(p.ProvinceRaw||'')}</div>`;
  html += `<div class="small"><b>Thời kỳ:</b> ${escapeHtml(p.PeriodRaw||'')}</div>`;
  html += `<div style="margin-top:8px"><b>Thành tựu:</b> ${escapeHtml(p.AchievementRaw||'')}</div>`;
  html += `<div style="margin-top:8px"><b>Tiểu sử:</b><br>${escapeHtml(p.BiographyRaw||'')}</div>`;
  if(p.ImageRaw) html += `<img src="${escapeHtml(p.ImageRaw)}" class="avatar" alt="${escapeHtml(p.Name)}">`;
  resultEl.innerHTML = html;
  resultEl.classList.remove('hidden');
  restartBtn.classList.remove('hidden');
  questionEl.textContent = 'Mình đã đoán xong — bạn muốn chơi lại?';
}

function showNoCandidateWithAdd(){
  controls.style.display = 'none';
  resultEl.innerHTML = `<strong>😅 Mình không đoán ra nhân vật này.</strong>
    <div class="small" style="margin-top:8px">
      Có thể là dữ liệu trong sheet chưa có hoặc thông tin chưa đủ chính xác.<br>
      Mình sẽ ghi nhớ (bạn có thể bổ sung vào sheet) và cải thiện lần sau nhé!
    </div>`;
  resultEl.classList.remove('hidden');
  restartBtn.classList.remove('hidden');
  questionEl.textContent = 'Mình chưa đoán được — bạn muốn chơi lại?';
}

/* ========== Bind UI ========== */
btnYes.addEventListener('click', ()=> handleAnswer('yes'));
btnNo.addEventListener('click', ()=> handleAnswer('no'));
btnUnknown.addEventListener('click', ()=> handleAnswer('unknown'));
restartBtn.addEventListener('click', ()=> {
  // go back to start
  gameCard.classList.add('hidden');
  startScreen.style.display = '';
});

/* ========== Init ========== */
questionEl.textContent = 'Nhấn BẮT ĐẦU CHƠI để bắt đầu.';
// expose startGame on window so button can call it
window.startGame = startGame;
</script>
</body>
</html>
